# Required repository secrets:
# - APPLE_CERTIFICATE_BASE64: Base64-encoded .p12 Developer ID Application certificate
# - APPLE_CERTIFICATE_PASSWORD: Password for the .p12 file
# - APPLE_ID: Apple ID email for notarytool
# - APPLE_ID_PASSWORD: App-specific password for notarytool
# - APPLE_TEAM_ID: Apple Team ID (VP24Z9CS22)

name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to use for DMG URLs"
        required: false
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Run test suite
        run: make test

  build-sign-notarize-dmg:
    runs-on: macos-26
    needs: test
    permissions:
      contents: write
    env:
      SIGNING_IDENTITY: "Developer ID Application: Isaiah Peters (VP24Z9CS22)"
      NOTARIZE_PROFILE: notarytool-profile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Capture release metadata
        run: |
          echo "VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)" >> "$GITHUB_ENV"
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Install DMG tooling
        run: brew install create-dmg

      - name: Import Apple certificate into temporary keychain
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/notionbridge-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/notionbridge-developer-id.p12"

          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcrun \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "CERT_PATH=$CERT_PATH" >> "$GITHUB_ENV"

      - name: Store notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "$NOTARIZE_PROFILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Build notarized DMG
        run: |
          make dmg \
            SIGNING_ID="$SIGNING_IDENTITY" \
            NOTARIZE_PROFILE="$NOTARIZE_PROFILE" \
            RELEASE_TAG="$RELEASE_TAG" \
            GENERATE_APPCAST=0

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: notion-bridge-v${{ env.VERSION }}.dmg
          path: .build/notion-bridge-v${{ env.VERSION }}.dmg

      - name: Publish GitHub release asset
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: .build/notion-bridge-v${{ env.VERSION }}.dmg

      - name: Cleanup temporary keychain
        if: ${{ always() }}
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
          if [ -n "${CERT_PATH:-}" ]; then
            rm -f "$CERT_PATH"
          fi
